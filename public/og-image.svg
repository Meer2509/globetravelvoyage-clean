<svg viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark navy background -->
  <rect width="1200" height="630" fill="#081C3A"/>
  <!-- Gradient overlays -->
  <radialGradient id="g1" cx="20%" cy="50%" r="60%">
    <stop offset="0%" stop-color="#1A56DB" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#081C3A" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="g2" cx="80%" cy="30%" r="50%">
    <stop offset="0%" stop-color="#C9A227" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#081C3A" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>

  <!-- Globe mark (large, right side) -->
  <circle cx="950" cy="315" r="230" stroke="rgba(255,255,255,0.06)" stroke-width="2" fill="none"/>
  <ellipse cx="950" cy="315" rx="230" ry="82" stroke="rgba(255,255,255,0.06)" stroke-width="1.5" fill="none"/>
  <ellipse cx="950" cy="315" rx="230" ry="160" stroke="rgba(255,255,255,0.04)" stroke-width="1.5" fill="none"/>
  <line x1="950" y1="85" x2="950" y2="545" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
  <line x1="720" y1="315" x2="1180" y2="315" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
  <!-- Gold arc -->
  <path d="M 760 440 Q 950 100 1140 220" stroke="#C9A227" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.8"/>
  <circle cx="1140" cy="220" r="12" fill="#C9A227" opacity="0.8"/>
  <circle cx="760" cy="440" r="7" fill="#C9A227" opacity="0.4"/>

  <!-- Logo mark (small, top-left) -->
  <circle cx="80" cy="80" r="36" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <ellipse cx="80" cy="80" rx="36" ry="13" stroke="rgba(255,255,255,0.12)" stroke-width="1" fill="none"/>
  <line x1="80" y1="44" x2="80" y2="116" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <line x1="44" y1="80" x2="116" y2="80" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <path d="M 55 98 Q 80 46 105 62" stroke="#C9A227" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <circle cx="105" cy="62" r="5" fill="#C9A227"/>

  <!-- Wordmark -->
  <text x="120" y="66" font-family="Georgia, serif" font-size="28" font-weight="700" fill="white" letter-spacing="2">GLOBE</text>
  <text x="246" y="66" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#93C5FD" letter-spacing="2">TRAVEL</text>
  <text x="120" y="96" font-family="Georgia, serif" font-size="20" font-weight="600" fill="#C9A227" letter-spacing="5">VOYAGE</text>

  <!-- Main headline -->
  <text x="80" y="230" font-family="Georgia, serif" font-size="62" font-weight="700" fill="white" letter-spacing="-1">AI Powered</text>
  <text x="80" y="310" font-family="Georgia, serif" font-size="62" font-weight="700" fill="#C9A227" letter-spacing="-1">Global Travel</text>

  <!-- Subheadline -->
  <text x="80" y="370" font-family="system-ui, sans-serif" font-size="24" fill="rgba(255,255,255,0.55)">Visas · Flights · Hotels · Tours · Rentals</text>

  <!-- Stats row -->
  <rect x="80" y="430" width="160" height="60" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="160" y="458" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#C9A227">50K+</text>
  <text x="160" y="478" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.45)" letter-spacing="0.5">TRAVELERS</text>

  <rect x="260" y="430" width="160" height="60" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="340" y="458" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#C9A227">190+</text>
  <text x="340" y="478" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.45)" letter-spacing="0.5">COUNTRIES</text>

  <rect x="440" y="430" width="160" height="60" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="520" y="458" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#C9A227">500+</text>
  <text x="520" y="478" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.45)" letter-spacing="0.5">EXPERTS</text>

  <!-- Bottom domain -->
  <text x="80" y="595" font-family="system-ui, sans-serif" font-size="15" fill="rgba(255,255,255,0.3)" letter-spacing="1">globetravelvoyage.com</text>
</svg>
