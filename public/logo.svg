<svg viewBox="0 0 280 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Globe Travel Voyage">
  <!-- Globe mark (32×32 centered at 16,32) -->
  <!-- Outer circle -->
  <circle cx="32" cy="32" r="28" fill="#081C3A"/>
  <!-- Latitude lines (horizontal) -->
  <ellipse cx="32" cy="32" rx="28" ry="10" stroke="rgba(255,255,255,0.18)" stroke-width="1" fill="none"/>
  <ellipse cx="32" cy="32" rx="28" ry="20" stroke="rgba(255,255,255,0.12)" stroke-width="1" fill="none"/>
  <!-- Meridian lines (vertical) -->
  <line x1="32" y1="4" x2="32" y2="60" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <line x1="10" y1="9" x2="54" y2="55" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="54" y1="9" x2="10" y2="55" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- Equator -->
  <line x1="4" y1="32" x2="60" y2="32" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <!-- Globe circle border -->
  <circle cx="32" cy="32" r="28" stroke="rgba(255,255,255,0.15)" stroke-width="1" fill="none"/>
  <!-- Gold flight arc -->
  <path d="M 10 44 Q 32 8 54 22" stroke="#C9A227" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Plane dot at arc end -->
  <circle cx="54" cy="22" r="3" fill="#C9A227"/>
  <circle cx="10" cy="44" r="2" fill="#C9A227" opacity="0.6"/>

  <!-- Wordmark -->
  <!-- "GLOBE" -->
  <text x="72" y="28" font-family="'Georgia', 'Times New Roman', serif" font-size="22" font-weight="700" fill="#081C3A" letter-spacing="1">GLOBE</text>
  <!-- "TRAVEL" in blue accent -->
  <text x="72" y="28" font-family="'Georgia', 'Times New Roman', serif" font-size="22" font-weight="700" fill="#081C3A" letter-spacing="1">
    <tspan fill="#081C3A">GLOBE</tspan>
    <tspan fill="#1A56DB" dx="4">TRAVEL</tspan>
  </text>
  <!-- "VOYAGE" in gold on second line -->
  <text x="72" y="52" font-family="'Georgia', 'Times New Roman', serif" font-size="15" font-weight="600" fill="#C9A227" letter-spacing="3">VOYAGE</text>
  <!-- Tagline -->
  <text x="72" y="62" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#6B7280" letter-spacing="1.5">AI POWERED GLOBAL TRAVEL</text>
</svg>
